<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>듀아리 Duari</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <main class="app-frame" aria-label="Duari app prototype">
    <section id="onboarding" class="onboarding is-visible">
      <div class="brand-mark">D</div>
      <h1>듀아리</h1>
      <div class="onboarding-card" id="onboardingCard"></div>
      <div class="dots" id="onboardingDots"></div>
      <div class="login-grid">
        <button class="ghost-btn" data-provider="E" aria-label="이메일 로그인">이메일</button>
        <button class="ghost-btn kakao" data-provider="K" aria-label="카카오 로그인">카카오</button>
        <button class="ghost-btn" data-provider="A" aria-label="애플 로그인">Apple</button>
        <button class="ghost-btn" data-provider="G" aria-label="구글 로그인">Google</button>
      </div>
      <button class="primary-btn full" id="signupApp">회원가입</button>
      <p class="tiny-note">둘만의 순간과 마음을 차분히 남겨요.</p>
    </section>

    <section id="app" class="app is-hidden">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="relationshipKicker">듀아리</p>
          <h2 id="screenTitle">오늘의 우리</h2>
        </div>
        <button class="icon-btn" id="openNotifications" aria-label="알림">알림</button>
      </header>

      <section id="home" class="screen active"></section>
      <section id="album" class="screen"></section>
      <section id="diary" class="screen"></section>
      <section id="questions" class="screen"></section>
      <section id="my" class="screen"></section>

      <nav class="bottom-nav" aria-label="하단 탭">
        <button class="nav-item active" data-tab="home"><span>⌂</span>홈</button>
        <button class="nav-item" data-tab="album"><span>▧</span>추억</button>
        <button class="nav-item" data-tab="diary"><span><ion-icon class="duari-ion-icon" name="chatbubble-ellipses-outline" aria-hidden="true"></ion-icon></span>대화</button>
        <button class="nav-item" data-tab="my"><span>☰</span>마이</button>
      </nav>
    </section>
  </main>

  <aside class="desktop-panel">
    <p class="eyebrow">Prototype Map</p>
    <h2>듀아리 화면 흐름</h2>
    <p>커플이 함께 남기는 순간 추억, 마음 기록, 대화 흐름을 빠르게 확인하는 HTML 프로토타입입니다.</p>
    <ul>
      <li>혼자/연결 상태 전환</li>
      <li>순간 추억 작성과 상세</li>
      <li>달력으로 보는 우리 추억</li>
      <li>나만 보기/내 공유 마음 일기</li>
      <li>대화 답변과 AI 마음 다듬기</li>
      <li>관계 관리, PIN, 기념일 설정</li>
    </ul>
  </aside>

  <div id="modal" class="modal" aria-hidden="true"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    window.__duariFinalRecordFlowGuard = true;
    window.__duariFinalAlbumAndRecordRestore = true;
  </script>
  <script>
    (() => {
      if (window.__duariLinkedDiaryEarlyRouter) return;
      window.__duariLinkedDiaryEarlyRouter = true;

      const openLinkedDiary = (event) => {
        if (event.target.closest?.("[data-linked-diary-menu], [data-linked-diary-dropdown], .linked-diary-menu-wrap, .linked-diary-right-tools")) return false;
        const card = event.target.closest?.(".memory-detail-page [data-linked-diary-index]");
        if (card?.dataset?.disableLinkedDiaryCardOpen === "true") return false;
        if (!card || typeof window.duariOpenLinkedDiaryCard !== "function") return false;
        window.duariOpenLinkedDiaryCard(card, event);
        return true;
      };

      const openDiaryEntry = (event) => {
        const card = event.target.closest?.("#diary [data-diary-entry-index]");
        if (!card || typeof window.duariOpenDiaryEntryCard !== "function") return false;
        window.duariOpenDiaryEntryCard(card, event);
        return true;
      };

      const openHomeDiary = (event) => {
        const card = event.target.closest?.("[data-home-shared-diary-index]");
        if (!card || typeof window.duariOpenHomeDiaryCard !== "function") return false;
        window.duariOpenHomeDiaryCard(card, event);
        return true;
      };

      window.addEventListener("click", (event) => {
        openLinkedDiary(event) || openDiaryEntry(event) || openHomeDiary(event);
      }, true);
      window.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        openLinkedDiary(event) || openDiaryEntry(event) || openHomeDiary(event);
      }, true);
    })();
  </script>
  <script type="module" src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
  <script src="script.js"></script>
  <script>
    (() => {
      if (window.__duariRecordDetailRouter) return;
      window.__duariRecordDetailRouter = true;

      const getRecordIndex = (card) => {
        const raw = card?.dataset?.memoryOpen ?? card?.dataset?.index ?? "0";
        const index = Number(raw);
        return Number.isFinite(index) ? index : 0;
      };

      const openRecordDetail = (card) => {
        if (!card || typeof openMemoryDetailLatestV3 !== "function") return;
        const index = getRecordIndex(card);
        const sourceTab = card.closest(".screen")?.id || "home";
        openMemoryDetailLatestV3(index, () => {
          if (typeof closeModal === "function") closeModal();
          if (typeof setTab === "function") setTab(sourceTab === "album" ? "album" : "home");
        });
      };

      window.addEventListener("click", (event) => {
        const albumTab = event.target.closest?.("#album [data-album-view]");
        if (albumTab) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          if (typeof state !== "undefined") state.albumView = albumTab.dataset.albumView || albumTab.dataset.view || "record";
          if (typeof renderAlbum === "function") renderAlbum();
          return;
        }

        const card = event.target.closest?.("#home .memory-card, #album .memory-card, #home [data-memory-open], #album [data-memory-open]");
        if (!card) return;
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
        openRecordDetail(card);
      }, true);

      window.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const card = event.target.closest?.("#home .memory-card, #album .memory-card, #home [data-memory-open], #album [data-memory-open]");
        if (!card) return;
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
        openRecordDetail(card);
      }, true);
    })();
  </script>
</body>
</html>
